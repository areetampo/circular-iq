name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          curl --fail -s -o /dev/null -w "Status: %{http_code}\nTime: %{time_total}s\nURL: ${{ vars.API_URL }}/health\n" \
          ${{ vars.API_URL }}/health
